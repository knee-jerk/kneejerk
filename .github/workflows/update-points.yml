name: Daily Points Decay Update

on:
  schedule:
    # Runs at 07:55 UTC every day (08:55 BST)
    - cron: '55 7 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab in GitHub

jobs:
  update-points:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run points decay calculator
        run: python calculate_points.py

      - name: Commit and push if changed
        run: |
          git config user.name "KneeJerk Bot"
          git config user.email "kneejerk-bot@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Daily points decay update - $(date +'%d %b %Y')"
          git push
